<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OTP Login API Test - Wellness Valley</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      max-width: 500px;
      width: 100%;
      padding: 40px;
    }
    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }
    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    .api-url {
      background: #f0f0f0;
      padding: 10px;
      border-radius: 8px;
      font-size: 12px;
      margin-bottom: 30px;
      word-break: break-all;
    }
    .section {
      margin-bottom: 30px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }
    input, select {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.3s;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #667eea;
    }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .response {
      margin-top: 20px;
      padding: 16px;
      border-radius: 8px;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
      display: none;
    }
    .response.success {
      background: #d4edda;
      border: 1px solid #c3e6cb;
      color: #155724;
      display: block;
    }
    .response.error {
      background: #f8d7da;
      border: 1px solid #f5c6cb;
      color: #721c24;
      display: block;
    }
    .response.info {
      background: #d1ecf1;
      border: 1px solid #bee5eb;
      color: #0c5460;
      display: block;
    }
    .otp-section {
      display: none;
    }
    .otp-section.active {
      display: block;
    }
    .otp-inputs {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }
    .otp-inputs input {
      flex: 1;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }
    .user-info {
      background: #e7f3ff;
      padding: 16px;
      border-radius: 8px;
      margin-top: 20px;
      display: none;
    }
    .user-info.active {
      display: block;
    }
    .user-info h3 {
      margin-bottom: 12px;
      color: #0c5460;
    }
    .user-info p {
      margin: 6px 0;
      font-size: 14px;
      color: #333;
    }
    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      display: inline-block;
      margin-left: 10px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔐 OTP Login Test</h1>
    <p class="subtitle">Wellness Valley PWA - Authentication API Demo</p>
    
    <div class="api-url">
      <strong>API:</strong> <span id="apiUrl">https://wellness-valley-pwa-backend-test.vercel.app</span>
    </div>

    <!-- Step 1: Send OTP -->
    <div id="sendSection" class="section">
      <label for="contactType">Login Method:</label>
      <select id="contactType">
        <option value="email">Email OTP</option>
        <option value="phone">Phone OTP (SMS)</option>
      </select>

      <div style="margin-top: 20px;">
        <label for="recipient">Email / Phone Number:</label>
        <input 
          type="text" 
          id="recipient" 
          placeholder="user@example.com or +919876543210"
          value=""
        />
      </div>

      <button id="sendBtn" onclick="sendOTP()" style="margin-top: 20px;">
        📤 Send OTP
      </button>
    </div>

    <!-- Step 2: Verify OTP -->
    <div id="otpSection" class="section otp-section">
      <label>Enter 6-Digit OTP:</label>
      <div class="otp-inputs">
        <input type="text" maxlength="1" class="otp-digit" data-index="0" />
        <input type="text" maxlength="1" class="otp-digit" data-index="1" />
        <input type="text" maxlength="1" class="otp-digit" data-index="2" />
        <input type="text" maxlength="1" class="otp-digit" data-index="3" />
        <input type="text" maxlength="1" class="otp-digit" data-index="4" />
        <input type="text" maxlength="1" class="otp-digit" data-index="5" />
      </div>

      <button id="verifyBtn" onclick="verifyOTP()" style="margin-top: 20px;">
        ✅ Verify OTP
      </button>

      <button onclick="resetForm()" style="margin-top: 10px; background: #6c757d;">
        ← Back to Send OTP
      </button>
    </div>

    <!-- Response Display -->
    <div id="response" class="response"></div>

    <!-- User Info Display -->
    <div id="userInfo" class="user-info">
      <h3>✅ Login Successful!</h3>
      <p><strong>User ID:</strong> <span id="userId"></span></p>
      <p><strong>Username:</strong> <span id="username"></span></p>
      <p><strong>Email:</strong> <span id="userEmail"></span></p>
      <p><strong>Phone:</strong> <span id="userPhone"></span></p>
      <p><strong>Status:</strong> <span id="userStatus"></span></p>
    </div>
  </div>

  <script>
    const API_BASE_URL = 'https://wellness-valley-pwa-backend-test.vercel.app';
    // const API_BASE_URL = 'http://localhost:3000'; // Uncomment for local testing

    document.getElementById('apiUrl').textContent = API_BASE_URL;

    let currentRecipient = '';
    let currentContactType = '';

    // OTP input auto-focus
    document.querySelectorAll('.otp-digit').forEach((input, index) => {
      input.addEventListener('input', (e) => {
        if (e.target.value.length === 1 && index < 5) {
          document.querySelectorAll('.otp-digit')[index + 1].focus();
        }
      });
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !e.target.value && index > 0) {
          document.querySelectorAll('.otp-digit')[index - 1].focus();
        }
      });
    });

    async function sendOTP() {
      const recipient = document.getElementById('recipient').value.trim();
      const contactType = document.getElementById('contactType').value;
      const btn = document.getElementById('sendBtn');
      const response = document.getElementById('response');

      if (!recipient) {
        showResponse('Please enter an email or phone number', 'error');
        return;
      }

      currentRecipient = recipient;
      currentContactType = contactType;

      btn.disabled = true;
      btn.innerHTML = '📤 Sending OTP <span class="spinner"></span>';
      showResponse('Sending OTP...', 'info');

      try {
        const res = await fetch(`${API_BASE_URL}/api/auth/send-otp`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ recipient, contactType }),
        });

        const data = await res.json();

        if (data.success) {
          showResponse(
            `✅ OTP sent successfully to ${recipient}\n\n` +
            (data.otp ? `🔑 TEST OTP: ${data.otp}\n\n` : '') +
            `Check your ${contactType} for the verification code.`,
            'success'
          );
          
          // If test OTP is returned, auto-fill it
          if (data.otp) {
            const digits = data.otp.toString().split('');
            document.querySelectorAll('.otp-digit').forEach((input, i) => {
              input.value = digits[i] || '';
            });
          }

          // Show OTP input section
          document.getElementById('sendSection').style.display = 'none';
          document.getElementById('otpSection').classList.add('active');
          document.querySelectorAll('.otp-digit')[0].focus();
        } else {
          showResponse(`❌ Failed: ${data.message}`, 'error');
        }
      } catch (error) {
        showResponse(`❌ Error: ${error.message}`, 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '📤 Send OTP';
      }
    }

    async function verifyOTP() {
      const otpDigits = Array.from(document.querySelectorAll('.otp-digit'))
        .map(input => input.value)
        .join('');

      if (otpDigits.length !== 6) {
        showResponse('Please enter all 6 digits', 'error');
        return;
      }

      const btn = document.getElementById('verifyBtn');
      const response = document.getElementById('response');

      btn.disabled = true;
      btn.innerHTML = '✅ Verifying <span class="spinner"></span>';
      showResponse('Verifying OTP...', 'info');

      try {
        const res = await fetch(`${API_BASE_URL}/api/auth/verify-otp`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            recipient: currentRecipient,
            otp: otpDigits,
            contactType: currentContactType,
          }),
        });

        const data = await res.json();

        if (data.success) {
          showResponse('✅ OTP Verified Successfully!', 'success');
          
          // Display user info
          document.getElementById('userId').textContent = data.user.id;
          document.getElementById('username').textContent = data.user.username;
          document.getElementById('userEmail').textContent = data.user.email || 'N/A';
          document.getElementById('userPhone').textContent = data.user.phone || 'N/A';
          document.getElementById('userStatus').textContent = data.user.status;
          document.getElementById('userInfo').classList.add('active');

          // Save to localStorage (example)
          localStorage.setItem('user', JSON.stringify(data.user));
          console.log('✅ User data saved to localStorage:', data.user);
        } else {
          showResponse(`❌ Verification Failed: ${data.message}`, 'error');
        }
      } catch (error) {
        showResponse(`❌ Error: ${error.message}`, 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '✅ Verify OTP';
      }
    }

    function resetForm() {
      document.getElementById('sendSection').style.display = 'block';
      document.getElementById('otpSection').classList.remove('active');
      document.getElementById('userInfo').classList.remove('active');
      document.getElementById('response').className = 'response';
      document.querySelectorAll('.otp-digit').forEach(input => input.value = '');
    }

    function showResponse(message, type) {
      const response = document.getElementById('response');
      response.textContent = message;
      response.className = `response ${type}`;
    }
  </script>
</body>
</html>
