apply plugin: 'com.android.application'

android {
    namespace "com.wellnessvalley.app"
    compileSdk rootProject.ext.compileSdkVersion
    
    defaultConfig {
        applicationId "com.wellnessvalley.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 16
        versionName "1.6.3"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        
        // Inject Gemini API key from environment variable or gradle.properties
        def geminiKey = project.hasProperty('GEMINI_API_KEY') ? GEMINI_API_KEY : System.getenv('GEMINI_API_KEY') ?: ""
        buildConfigField "String", "GEMINI_API_KEY", "\"${geminiKey}\""
        
        // ✅ ANDROID PERFORMANCE: Enable multidex for better performance
        multiDexEnabled true
        
        // NDK configuration for 16KB alignment
        ndk {
            abiFilters 'arm64-v8a', 'armeabi-v7a', 'x86_64'
        }
        
        aaptOptions {
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
        
        // ✅ ANDROID PERFORMANCE: Vector drawable support
        vectorDrawables.useSupportLibrary = true
    }
    
    signingConfigs {
    release {
        storeFile file('../wellness-valley-keystore.jks')
        storePassword 'MyWellnessValley@234#'
        keyAlias 'wellness-valley'
        keyPassword 'MyWellnessValley@234#'
    }
}
    
    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    
    compileOptions {
        // Set to Java 17
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    
    packagingOptions {
        // Helps with 16KB alignment
        jniLibs {
            useLegacyPackaging = false
        }
        
        // Ensure 16KB alignment for all native libraries
        doNotStrip "**/*.so"
        pickFirst "**/libc++_shared.so"
    }
    
    // Enable 16KB page size support
    buildFeatures {
        buildConfig = true
    }
}

repositories {
    google()
    mavenCentral()
    flatDir {
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.work:work-runtime:2.8.1"
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation 'androidx.core:core:1.12.0'
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
    
    // Updated desugaring for Java 17
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'

    // OkHttp for Gemini API client
    implementation 'com.squareup.okhttp3:okhttp:4.10.0'

    // AndroidX Security Crypto for EncryptedSharedPreferences
    implementation 'androidx.security:security-crypto:1.1.0-alpha06'
    
    // Google Play In-App Updates
    implementation 'com.google.android.play:app-update:2.1.0'
    implementation 'com.google.android.play:app-update-ktx:2.1.0'
    
    // Material Components (for Snackbar)
    implementation 'com.google.android.material:material:1.9.0'
}

apply from: 'capacitor.build.gradle'
apply from: "custom-capacitor.gradle"

tasks.withType(JavaCompile).configureEach {
    options.compilerArgs += [
        "-Xlint:unchecked",
        "-Xlint:deprecation"
    ]
    options.encoding = 'UTF-8'
}

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}