name: PR Validator

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  validate:
    name: PR title, template, AI tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Conventional PR title
        uses: amannn/action-semantic-pull-request@v5
        env: { GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} }
        with:
          types: |
            feat
            fix
            refactor
            perf
            test
            docs
            chore
            sec
            infra
          requireScope: true

      - name: PR body completeness
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_FILES_URL: ${{ github.event.pull_request.url }}/files
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/pr-template-check.js

      - name: Business Logic Impact Block (if domain/ touched)
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: node scripts/business-logic-block-check.js

      - name: AI assistance disclosure
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: node scripts/ai-disclosure-check.js

  commit-lint:
    name: Conventional commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.json
