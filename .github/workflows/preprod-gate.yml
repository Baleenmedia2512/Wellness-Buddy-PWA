name: Pre-Prod Gate

on:
  push:
    branches: ['release/**']
  workflow_dispatch:
    inputs:
      target_sha:
        description: 'SHA to validate'
        required: true

jobs:
  gate:
    name: Pre-Prod Readiness Gate
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_sha || github.sha }}
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }

      - name: Install
        run: |
          cd backend && npm ci --no-audit --no-fund && cd ..
          cd frontend && npm ci --no-audit --no-fund && cd ..

      - name: Unit + integration (full)
        run: |
          cd backend && npx jest --ci
          cd ../frontend && npx jest --ci

      - name: Regression E2E
        run: cd e2e && npx playwright test --grep @regression

      - name: Migration dry-run on prod clone
        env:
          DATABASE_URL: ${{ secrets.PROD_CLONE_DATABASE_URL }}
        run: node scripts/migration-dry-run.js

      - name: Smoke against staging
        env:
          SMOKE_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
        run: node scripts/smoke-test.js

      - name: Lighthouse CI (perf budget)
        run: npx -y @lhci/cli@0.13 autorun --config=.lighthouserc.json

      - name: Bundle-size delta
        run: node scripts/bundle-size-guard.js frontend/build --baseline release

      - name: Security scans
        run: |
          npx -y semgrep --config p/owasp-top-ten --error
          npx -y osv-scanner --recursive ./

      - name: QA Bot (human-like journeys)
        env:
          SMOKE_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
          QA_BOT_USER: ${{ secrets.QA_BOT_USER }}
          QA_BOT_PASS: ${{ secrets.QA_BOT_PASS }}
        run: node scripts/qa-bot.js

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: preprod-gate-report
          path: reports/

      - name: Verdict
        run: node scripts/preprod-verdict.js reports/qa-bot-*.json
