name: Architecture

on:
  pull_request:
  push:
    branches: [main, staging]

jobs:
  vsa:
    name: Vertical Slice Architecture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm run vsa:check
      - uses: actions/upload-artifact@v4
        with: { name: vsa-diagnostic, path: reports/vsa-diagnostic.json }

  dep-cruise:
    name: Dependency Cruiser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: cd backend && npm ci --no-audit --no-fund
      - run: cd frontend && npm ci --no-audit --no-fund
      - run: npx -y dependency-cruiser@16 --config .dependency-cruiser.cjs --output-type err backend frontend/src

  duplicates:
    name: Duplicate logic finder
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: node scripts/find-duplicates.js --threshold 0.85 --fail-on-new

  adr-check:
    name: ADR required for new top-level folders
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - run: node scripts/adr-required-check.js ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }}
