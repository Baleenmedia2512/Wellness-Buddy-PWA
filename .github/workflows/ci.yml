name: CI

on:
  pull_request:
    branches: [main, staging, 'release/**']
  push:
    branches: [main, staging, 'release/**']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ---------------- STAGE 1 ----------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'npm' }
      - name: Install (backend)
        working-directory: backend
        run: npm ci --no-audit --no-fund
      - name: Install (frontend)
        working-directory: frontend
        run: npm ci --no-audit --no-fund
      - name: ESLint backend
        run: npm run lint:backend
      - name: ESLint frontend
        run: npm run lint:frontend
      - name: Forbidden patterns (console.log, TODO without id, catch{})
        run: node scripts/forbidden-patterns.js

  typecheck:
    name: Typecheck (jsconfig)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'npm' }
      - run: cd backend && npm ci --no-audit --no-fund
      - run: cd frontend && npm ci --no-audit --no-fund
      - name: TS check backend
        run: npx -y typescript@5 --noEmit -p backend/jsconfig.json || true
      - name: TS check frontend
        run: npx -y typescript@5 --noEmit -p frontend/jsconfig.json || true

  architecture:
    name: Architecture (VSA + dep-cruiser)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'npm' }
      - run: cd backend && npm ci --no-audit --no-fund
      - run: cd frontend && npm ci --no-audit --no-fund
      - name: VSA diagnostic
        run: npm run vsa:check
      - name: Dependency Cruiser
        run: npx -y dependency-cruiser@16 --config .dependency-cruiser.cjs backend frontend/src
      - name: File size cap (warn 350 / fail 500 LOC)
        run: node scripts/file-size-guard.js

  secrets:
    name: Secrets scan
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env: { GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} }

  # ---------------- STAGE 2 ----------------
  unit:
    name: Unit tests
    needs: [lint, typecheck, architecture]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        target: [backend, frontend]
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'npm' }
      - run: cd ${{ matrix.target }} && npm ci --no-audit --no-fund
      - name: Run unit tests (shard ${{ matrix.shard }}/4)
        working-directory: ${{ matrix.target }}
        run: npx jest --ci --runInBand --shard=${{ matrix.shard }}/4 --coverage --coverageReporters=json
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.target }}-${{ matrix.shard }}
          path: ${{ matrix.target }}/coverage/coverage-final.json
          if-no-files-found: ignore

  integration:
    name: Integration tests
    needs: [unit]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: wellness_test
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U postgres" --health-interval=5s --health-timeout=5s --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'npm' }
      - run: cd backend && npm ci --no-audit --no-fund
      - name: Apply migrations
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/wellness_test
        run: node scripts/migration-apply.js
      - name: Run integration tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/wellness_test
          NODE_ENV: test
        run: cd backend && npx jest --ci --testPathPattern='integration' --runInBand

  coverage-gate:
    name: Coverage gate (claude.md §9.1)
    needs: [unit]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { pattern: 'coverage-*', path: coverage-raw }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}' }
      - name: Enforce per-path coverage floors
        run: node scripts/coverage-gate.js coverage-raw

  # ---------------- STAGE 3 ----------------
  build-backend:
    name: Build backend (Next.js)
    needs: [unit, integration]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'npm' }
      - run: cd backend && npm ci --no-audit --no-fund
      - name: Cache .next
        uses: actions/cache@v4
        with:
          path: backend/.next/cache
          key: next-${{ runner.os }}-${{ hashFiles('backend/package-lock.json') }}-${{ hashFiles('backend/**/*.js') }}
          restore-keys: next-${{ runner.os }}-${{ hashFiles('backend/package-lock.json') }}-
      - run: cd backend && npm run build

  build-frontend:
    name: Build frontend (CRA)
    needs: [unit]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: 'npm' }
      - run: cd frontend && npm ci --no-audit --no-fund
      - name: Build
        env: { CI: 'true', GENERATE_SOURCEMAP: 'false' }
        run: cd frontend && npm run build
      - name: Bundle-size guard
        run: node scripts/bundle-size-guard.js frontend/build

  pr-gate:
    name: PR Gate (summary)
    if: github.event_name == 'pull_request'
    needs: [lint, typecheck, architecture, secrets, unit, integration, coverage-gate, build-backend, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All required PR checks passed."
